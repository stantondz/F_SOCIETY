<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE CLASS - PRO EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Amiri&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #ffffff; color: #1e293b; margin: 0; overflow: hidden; user-select: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input { background: #f8fafc !important; border: 1px solid #e2e8f0 !important; color: #1e293b !important; border-radius: 12px !important; outline: none; }
        .code-text { font-family: monospace; background: #f1f5f9; padding: 5px 12px; border-radius: 10px; color: #0284c7; font-weight: bold; }
        .loader { border: 3px solid #f1f5f9; border-top: 3px solid #0284c7; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .quran-font { font-family: 'Amiri', serif; }
        .sidebar-bg { background: #38bdf8; }
        .chat-tab { transition: all 0.3s; cursor: pointer; border-bottom: 3px solid transparent; }
        .chat-tab.active { border-bottom-color: #0284c7; color: #0284c7; font-weight: 900; }
        .doc-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 25px; padding: 20px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyDdGJrBkh44afdi9UtdvD98sJk_xr7VICY",
            authDomain: "eliteclassapp-52651.firebaseapp.com",
            projectId: "eliteclassapp-52651",
            storageBucket: "eliteclassapp-52651.firebasestorage.app",
            messagingSenderId: "557001115329",
            appId: "1:557001115329:web:011925da55c84f3c737640"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const { useState, useEffect, useRef, useMemo } = React;

        const cleanText = (t) => {
            if (!t) return "";
            return t.replace(/[\u064B-\u0652\u0670\u06D6-\u06ED]/g, "").replace(/[.:!؟?،,;؛]/g, "").trim();
        };

        const getAv = (s) => `https://api.dicebear.com/7.x/adventurer/svg?seed=${s || Math.random()}`;

        function DhikrPopup({ onClose }) {
            const dhikr = ["سبحان الله وبحمده سبحان الله العظيم", "لا اله الا الله وحده لا شريك له", "الحمد لله رب العالمين", "استغفر الله العظيم واتوب اليه", "اللهم صل وسلم على نبينا محمد"][Math.floor(Math.random() * 5)];
            return (
                <div className="fixed inset-0 z-[300] flex items-center justify-center p-6 bg-black/40 backdrop-blur-sm">
                    <div className="bg-white p-10 max-w-sm w-full text-center space-y-8 rounded-[40px] shadow-2xl">
                        <div className="w-20 h-20 bg-sky-100 text-sky-600 rounded-full flex items-center justify-center mx-auto text-3xl"><i className="fas fa-mosque"></i></div>
                        <p className="quran-font text-3xl text-slate-800 leading-relaxed font-bold">{dhikr}</p>
                        <button onClick={onClose} className="w-full py-5 bg-sky-500 text-white rounded-2xl font-black shadow-lg">تم</button>
                    </div>
                </div>
            );
        }

        function App() {
            const [profile, setProfile] = useState(null);
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('selection'); 
            const [tab, setTab] = useState('home');
            const [menu, setMenu] = useState(false);
            const [showDhikr, setShowDhikr] = useState(false);

            useEffect(() => {
                const c = localStorage.getItem('elite_user_code');
                if (c) {
                    return db.collection('users').doc(c).onSnapshot(s => {
                        if (s.exists) { setProfile(s.data()); setView('main'); setShowDhikr(true); }
                        setLoading(false);
                    }, () => setLoading(false));
                } else setLoading(false);
            }, []);

            if (loading) return <div className="h-screen flex flex-col items-center justify-center bg-white"><div className="loader mb-4"></div><p className="font-black text-sky-600">جاري التحميل</p></div>;

            return (
                <div className="app-container relative">
                    {showDhikr && <DhikrPopup onClose={() => setShowDhikr(false)} />}
                    {view === 'selection' && <Selection onSelect={setView} />}
                    {view === 'auth_teacher' && <TeacherAuth onBack={() => setView('selection')} onLogin={p => { setProfile(p); setView('main'); setShowDhikr(true); }} />}
                    {view === 'auth_student' && <StudentAuth onBack={() => setView('selection')} onLogin={p => { setProfile(p); setView('main'); setShowDhikr(true); }} />}
                    {view === 'main' && profile && (
                        <div className="flex flex-col h-screen">
                            <header className="p-6 flex justify-between items-center bg-white border-b border-slate-100 z-50">
                                <div className="flex items-center gap-4">
                                    <button onClick={() => setMenu(true)} className="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-600"><i className="fas fa-bars-staggered"></i></button>
                                    <h1 className="font-black text-2xl text-sky-600">{cleanText("ELITE CLASS")}</h1>
                                </div>
                                <div className="flex items-center gap-3 bg-slate-50 p-1 pr-4 rounded-full">
                                    <span className="text-xs font-black text-slate-600">{cleanText(profile.firstName)}</span>
                                    <img src={profile.avatarUrl || getAv(profile.uid)} className="w-10 h-10 rounded-full border border-sky-200" />
                                </div>
                            </header>
                            <main className="flex-1 overflow-y-auto p-5 pb-32 no-scrollbar">
                                <Content tab={tab} profile={profile} onTab={setTab} />
                            </main>
                            <nav className="fixed bottom-0 left-0 right-0 bg-white p-6 flex justify-around items-center rounded-t-[40px] z-50 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] border-t border-slate-50">
                                <button onClick={()=>setTab('home')} className={tab==='home'?'text-sky-600 scale-125 transition-all':'text-slate-300'}><i className="fas fa-house text-2xl"></i></button>
                                <button onClick={()=>setTab('chat')} className={tab==='chat'?'text-sky-600 scale-125 transition-all':'text-slate-300'}><i className="fas fa-comments text-2xl"></i></button>
                                <div className="w-16 h-16 bg-sky-500 rounded-full flex items-center justify-center -mt-16 border-[6px] border-white text-white shadow-xl"><i className="fas fa-plus"></i></div>
                                <button onClick={()=>setTab('points')} className={tab==='points'?'text-sky-600 scale-125 transition-all':'text-slate-300'}><i className="fas fa-star text-2xl"></i></button>
                                <button onClick={()=>setTab('classes')} className={tab==='classes'?'text-sky-600 scale-125 transition-all':'text-slate-300'}><i className="fas fa-users-rectangle text-2xl"></i></button>
                            </nav>
                            {menu && <Sidebar onClose={() => setMenu(false)} onTab={t => { setTab(t); setMenu(false); }} onLogout={() => { localStorage.removeItem('elite_user_code'); window.location.reload(); }} />}
                        </div>
                    )}
                </div>
            );
        }

        function Selection({ onSelect }) {
            return (
                <div className="h-screen flex flex-col items-center justify-center p-8 space-y-12 bg-white">
                    <h1 className="text-6xl font-black text-sky-600 tracking-tighter">{cleanText("ELITE CLASS")}</h1>
                    <div className="grid grid-cols-1 gap-6 w-full max-w-xs">
                        <button onClick={() => onSelect('auth_teacher')} className="bg-slate-50 p-8 flex items-center gap-6 rounded-[30px] border border-slate-100 group"><div className="w-16 h-16 bg-sky-500 rounded-2xl flex items-center justify-center text-2xl text-white shadow-md"><i className="fas fa-user-tie"></i></div><span className="font-black text-xl text-slate-800">{cleanText("استاذ")}</span></button>
                        <button onClick={() => onSelect('auth_student')} className="bg-slate-50 p-8 flex items-center gap-6 rounded-[30px] border border-slate-100 group"><div className="w-16 h-16 bg-sky-400 rounded-2xl flex items-center justify-center text-2xl text-white shadow-md"><i className="fas fa-graduation-cap"></i></div><span className="font-black text-xl text-slate-800">{cleanText("تلميذ")}</span></button>
                    </div>
                </div>
            );
        }

        function TeacherAuth({ onBack, onLogin }) {
            const [mode, setMode] = useState('menu'); 
            const [f, setF] = useState('');
            const [l, setL] = useState('');
            const [gc, setGc] = useState('');
            const [ic, setIc] = useState('');
            const [ld, setLd] = useState(false);
            const create = async () => {
                if (!f || !l) return;
                setLd(true);
                const c = 'TCH-' + Math.random().toString(36).substr(2, 8).toUpperCase();
                const p = { uid: c, firstName: cleanText(f), lastName: cleanText(l), role: 'teacher', points: 0, avatarUrl: getAv(c) };
                await db.collection('users').doc(c).set(p);
                setGc(c); setMode('show'); setLd(false);
            };
            const login = async () => {
                if (!ic) return;
                setLd(true);
                const s = await db.collection('users').doc(ic).get();
                if (s.exists && s.data().role === 'teacher') { localStorage.setItem('elite_user_code', ic); onLogin(s.data()); }
                else alert('كود خاطئ');
                setLd(false);
            };
            return (
                <div className="h-screen flex flex-col items-center justify-center p-8 space-y-8 bg-white">
                    <button onClick={onBack} className="absolute top-10 right-10 text-slate-300"><i className="fas fa-arrow-right text-2xl"></i></button>
                    <h2 className="text-4xl font-black text-slate-800">{cleanText("بوابة الاستاذ")}</h2>
                    {mode === 'menu' && <div className="w-full max-w-xs space-y-4"><button onClick={() => setMode('create')} className="w-full p-6 bg-slate-50 border border-slate-100 rounded-3xl font-black text-slate-700">انشاء حساب جديد</button><button onClick={() => setMode('login')} className="w-full p-6 bg-sky-50 rounded-3xl font-black text-sky-700">تسجيل الدخول</button></div>}
                    {mode === 'create' && <div className="w-full max-w-xs space-y-4"><input type="text" placeholder="الاسم" className="w-full p-5" value={f} onChange={e=>setF(e.target.value)} /><input type="text" placeholder="اللقب" className="w-full p-5" value={l} onChange={e=>setL(e.target.value)} /><button onClick={create} className="w-full p-6 bg-sky-500 text-white rounded-3xl font-black shadow-md">{ld?'جاري':'توليد الكود'}</button></div>}
                    {mode === 'show' && <div className="w-full max-w-xs text-center space-y-6"><h3 className="text-xl font-black text-slate-700">{cleanText("كودك السري")}</h3><div className="bg-slate-50 p-8 text-3xl font-black text-sky-600 select-all rounded-3xl border border-slate-100">{gc}</div><button onClick={() => setMode('login')} className="w-full p-6 bg-sky-500 text-white rounded-3xl font-black">دخول</button></div>}
                    {mode === 'login' && <div className="w-full max-w-xs space-y-4"><input type="text" placeholder="ادخل كودك" className="w-full p-6 text-center font-black text-2xl" value={ic} onChange={e=>setIc(e.target.value)} /><button onClick={login} className="w-full p-6 bg-sky-500 text-white rounded-3xl font-black shadow-md">دخول</button></div>}
                </div>
            );
        }

        function StudentAuth({ onBack, onLogin }) {
            const [ic, setIc] = useState('');
            const [ld, setLd] = useState(false);
            const login = async () => {
                if (!ic) return;
                setLd(true);
                const s = await db.collection('users').doc(ic).get();
                if (s.exists && s.data().role === 'student') { localStorage.setItem('elite_user_code', ic); onLogin(s.data()); }
                else alert('كود التلميذ غير موجود');
                setLd(false);
            };
            return (
                <div className="h-screen flex flex-col items-center justify-center p-8 space-y-8 bg-white">
                    <button onClick={onBack} className="absolute top-10 right-10 text-slate-300"><i className="fas fa-arrow-right text-2xl"></i></button>
                    <h2 className="text-4xl font-black text-slate-800">{cleanText("بوابة التلميذ")}</h2>
                    <input type="text" placeholder="ادخل كود التلميذ" className="w-full max-w-xs p-8 bg-slate-50 border border-slate-100 text-center font-black text-2xl rounded-3xl" value={ic} onChange={e=>setIc(e.target.value)} />
                    <button onClick={login} className="w-full max-w-xs p-6 bg-sky-500 text-white rounded-3xl font-black shadow-md">دخول</button>
                </div>
            );
        }

        function Content({ tab, profile, onTab }) {
            switch(tab) {
                case 'home': return <Home profile={profile} />;
                case 'chat': return <Chat profile={profile} />;
                case 'points': return <Points profile={profile} />;
                case 'exams': return <iframe src="https://www.dzexams.com" className="w-full h-full rounded-[30px] border border-slate-100" />;
                case 'ai': return <div className="h-full flex flex-col items-center justify-center p-10 text-center space-y-8"><div className="w-32 h-32 bg-sky-500 rounded-[40px] flex items-center justify-center text-6xl text-white shadow-xl"><i className="fas fa-robot"></i></div><h2 className="text-3xl font-black text-slate-800">{cleanText("مساعد ذكي")}</h2><button onClick={() => window.open('https://gemini.google.com', '_blank')} className="px-10 py-5 bg-sky-500 text-white rounded-3xl font-black shadow-lg">فتح المساعد</button></div>;
                case 'calc': return <iframe src="https://www.dzexams.pro/ar/releve/releve-2sc-mob.php" className="w-full h-full rounded-[30px] border border-slate-100" />;
                case 'classes': return <Classes profile={profile} />;
                case 'info': return <Info />;
                default: return <Home profile={profile} />;
            }
        }

        function Home({ profile }) {
            const refreshAvatar = async () => {
                const newSeed = Math.random().toString(36).substring(7);
                const newUrl = getAv(newSeed);
                await db.collection('users').doc(profile.uid).update({ avatarUrl: newUrl });
            };
            return (
                <div className="bg-white p-10 text-center space-y-8 rounded-[40px] border border-slate-100 shadow-sm">
                    <div className="relative inline-block">
                        <img src={profile.avatarUrl || getAv(profile.uid)} className="w-48 h-48 rounded-full mx-auto border-4 border-sky-100 shadow-md bg-sky-50" />
                        <button onClick={refreshAvatar} className="absolute bottom-2 right-2 bg-sky-500 text-white w-10 h-10 rounded-full border-4 border-white flex items-center justify-center shadow-lg"><i className="fas fa-sync-alt"></i></button>
                    </div>
                    <h2 className="text-3xl font-black text-slate-800">{cleanText("مرحبا")} {cleanText(profile.firstName)}</h2>
                    <div className="grid grid-cols-1 gap-4">
                        {profile.role === 'student' ? (
                            <div className="bg-sky-50 p-8 rounded-3xl border border-sky-100">
                                <p className="text-[10px] text-sky-600 font-black mb-2 uppercase">{cleanText("نقاط المشاركة")}</p>
                                <p className="text-7xl font-black text-sky-600">{profile.points || 0}</p>
                            </div>
                        ) : (
                            <div className="bg-slate-50 p-5 rounded-3xl border border-slate-100"><p className="text-[10px] text-slate-400 uppercase font-bold">{cleanText("الرتبة")}</p><p className="font-black text-slate-700">{cleanText("استاذ")}</p></div>
                        )}
                        <div className="bg-slate-50 p-5 rounded-3xl border border-slate-100"><p className="text-[10px] text-slate-400 uppercase font-bold">{cleanText("كود الحساب")}</p><p className="code-text select-all">{profile.uid}</p></div>
                    </div>
                </div>
            );
        }

        function Points({ profile }) {
            const [cls, setCls] = useState([]);
            const [sel, setSel] = useState(null);
            const [stds, setStds] = useState([]);
            useEffect(() => {
                if (profile.role === 'teacher') {
                    return db.collection('classes').where('teacherId', '==', profile.uid).onSnapshot(s => {
                        const l = s.docs.map(d => ({ id: d.id, ...d.data() }));
                        setCls(l); if (l.length > 0 && !sel) setSel(l[0]);
                    });
                } else if (profile.classId) {
                    db.collection('classes').doc(profile.classId).get().then(d => d.exists && setSel({ id: d.id, ...d.data() }));
                }
            }, [profile]);
            useEffect(() => {
                if (sel) {
                    return db.collection(`classes/${sel.id}/students`).onSnapshot(s => {
                        const l = s.docs.map(d => ({ id: d.id, ...d.data() }));
                        l.sort((a, b) => (b.participation || 0) - (a.participation || 0));
                        setStds(l);
                    });
                }
            }, [sel]);
            const up = async (sid, d) => {
                const s = stds.find(x => x.id === sid);
                const n = Math.max(0, (s.participation || 0) + d);
                await db.collection(`classes/${sel.id}/students`).doc(sid).update({ participation: n });
            };
            return (
                <div className="space-y-6">
                    <h2 className="text-2xl font-black text-slate-800">{cleanText("لوحة الشرف")}</h2>
                    {profile.role==='teacher'&&cls.length>1&&<div className="flex gap-3 overflow-x-auto no-scrollbar">{cls.map(c=><button key={c.id} onClick={()=>setSel(c)} className={`px-5 py-3 rounded-2xl text-xs font-black transition-all ${sel?.id===c.id?'bg-sky-500 text-white shadow-md':'bg-slate-50 text-slate-400'}`}>{cleanText(c.name)}</button>)}</div>}
                    <div className="bg-white p-6 space-y-4 rounded-[35px] border border-slate-100 shadow-sm">
                        {stds.map((s, i) => (
                            <div key={s.id} className="flex items-center justify-between p-4 bg-slate-50 rounded-3xl border border-slate-100">
                                <div className="flex items-center gap-4">
                                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center font-black ${i===0?'bg-yellow-400 text-white':i===1?'bg-slate-300 text-white':i===2?'bg-amber-600 text-white':'bg-slate-200 text-slate-500'}`}>{i+1}</div>
                                    <div><p className="font-black text-sm text-slate-700">{cleanText(s.fullName)}</p><p className="text-[10px] text-sky-600 font-black uppercase">{cleanText("النقاط")} {s.participation || 0}</p></div>
                                </div>
                                {profile.role==='teacher' && <div className="flex gap-2"><button onClick={()=>up(s.id,1)} className="w-10 h-10 bg-sky-100 text-sky-600 rounded-xl"><i className="fas fa-plus"></i></button><button onClick={()=>up(s.id,-1)} className="w-10 h-10 bg-red-50 text-red-600 rounded-xl"><i className="fas fa-minus"></i></button></div>}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function Chat({ profile }) {
            const [mode, setMode] = useState('global'); // 'global' or 'class'
            const [code, setCode] = useState('');
            const [cls, setCls] = useState(null);
            const [msgs, setMsgs] = useState([]);
            const [text, setText] = useState('');
            const scroll = useRef();

            useEffect(() => {
                const path = mode === 'global' ? 'global_messages' : `classes/${cls?.id}/messages`;
                if (mode === 'global' || (mode === 'class' && cls)) {
                    return db.collection(path).orderBy('timestamp', 'asc').onSnapshot(s => {
                        setMsgs(s.docs.map(d => ({ id: d.id, ...d.data() })));
                        setTimeout(() => scroll.current?.scrollTo(0, scroll.current.scrollHeight), 100);
                    });
                }
            }, [mode, cls]);

            const joinClass = async () => {
                if (!code) return;
                const s = await db.collection('classes').where('chatCode', '==', code).get();
                if (!s.empty) {
                    const classData = s.docs[0].data();
                    // حماية: التأكد أن التلميذ ينتمي لهذا القسم فعلاً
                    if (profile.role === 'student' && profile.classId !== s.docs[0].id) {
                        alert('هذا الكود لقسم اخر لا تنتمي اليه');
                        return;
                    }
                    setCls({ id: s.docs[0].id, ...classData });
                } else alert('كود القسم غير صحيح');
            };

            const send = async () => {
                if (!text) return;
                const path = mode === 'global' ? 'global_messages' : `classes/${cls.id}/messages`;
                await db.collection(path).add({
                    senderId: profile.uid,
                    senderName: cleanText(profile.firstName),
                    senderAvatar: profile.avatarUrl || getAv(profile.uid),
                    text,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                setText('');
            };

            return (
                <div className="h-full flex flex-col -m-5 bg-white">
                    <div className="flex border-b border-slate-100">
                        <div onClick={()=>setMode('global')} className={`flex-1 p-4 text-center chat-tab ${mode==='global'?'active':''}`}>{cleanText("الشات العالمي")}</div>
                        <div onClick={()=>setMode('class')} className={`flex-1 p-4 text-center chat-tab ${mode==='class'?'active':''}`}>{cleanText("شات القسم")}</div>
                    </div>

                    {mode === 'class' && !cls ? (
                        <div className="flex-1 flex flex-col items-center justify-center p-8 space-y-6">
                            <div className="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center text-3xl text-sky-500"><i className="fas fa-lock"></i></div>
                            <input type="text" placeholder="ادخل كود شات القسم" className="w-full max-w-xs p-5 text-center font-black" value={code} onChange={e=>setCode(e.target.value)} />
                            <button onClick={joinClass} className="w-full max-w-xs py-4 bg-sky-500 text-white rounded-2xl font-black">دخول القسم</button>
                        </div>
                    ) : (
                        <React.Fragment>
                            <div className="flex-1 overflow-y-auto p-5 space-y-5 no-scrollbar" ref={scroll}>
                                {msgs.map(m => (
                                    <div key={m.id} className={`flex gap-3 max-w-[85%] ${m.senderId === profile.uid ? 'mr-auto flex-row-reverse' : 'ml-auto'}`}>
                                        <img src={m.senderAvatar} className="w-8 h-8 rounded-full mt-auto border border-slate-100" />
                                        <div className={`p-4 rounded-[25px] ${m.senderId === profile.uid ? 'bg-sky-500 text-white rounded-tl-none' : 'bg-slate-50 text-slate-700 rounded-tr-none border border-slate-100'}`}>
                                            <p className="text-[8px] opacity-40 mb-1 font-black">{m.senderName}</p><p className="text-sm font-medium leading-relaxed">{m.text}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="p-4 bg-white border-t border-slate-100 flex gap-3">
                                <input type="text" placeholder="اكتب رسالة" className="flex-1 px-6 py-4 outline-none text-sm" value={text} onChange={e=>setText(e.target.value)} onKeyPress={e=>e.key==='Enter'&&send()} />
                                <button onClick={send} className="w-14 h-14 bg-sky-500 text-white rounded-full flex items-center justify-center shadow-md"><i className="fas fa-paper-plane"></i></button>
                            </div>
                        </React.Fragment>
                    )}
                </div>
            );
        }

        function Classes({ profile }) {
            const [cls, setCls] = useState([]);
            const [showC, setShowC] = useState(false);
            const [showS, setShowS] = useState(false);
            const [cn, setCn] = useState('');
            const [sn, setSn] = useState('');
            const [sel, setSel] = useState(null);
            const [stds, setStds] = useState([]);
            useEffect(() => {
                if (profile.role === 'teacher') {
                    return db.collection('classes').where('teacherId', '==', profile.uid).onSnapshot(s => setCls(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                }
            }, [profile.uid]);
            useEffect(() => {
                if (sel) {
                    return db.collection(`classes/${sel.id}/students`).onSnapshot(s => setStds(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                }
            }, [sel]);
            const addC = async () => {
                if (!cn) return;
                const c = Math.floor(10000000 + Math.random() * 90000000).toString();
                await db.collection('classes').add({ name: cleanText(cn), teacherId: profile.uid, chatCode: c });
                setShowC(false); setCn('');
            };
            const addS = async () => {
                if (!sn) return;
                await db.collection(`classes/${sel.id}/students`).add({ fullName: cleanText(sn), participation: 0, test1: 0, test2: 0, exam: 0, secretCode: '---' });
                setSn(''); setShowS(false);
            };
            const gen = async () => {
                if (!sel || stds.length === 0) return;
                for (const s of stds.filter(x => x.secretCode === '---')) {
                    const c = 'STD-' + Math.random().toString(36).substr(2, 6).toUpperCase();
                    await db.collection('users').doc(c).set({ uid: c, firstName: cleanText(s.fullName), role: 'student', points: 0, classId: sel.id, avatarUrl: getAv(c) });
                    await db.collection(`classes/${sel.id}/students`).doc(s.id).update({ secretCode: c });
                }
                alert('تم التوليد');
            };
            if (profile.role === 'student') return <div className="p-20 text-center opacity-20 font-black">{cleanText("قسم الاساتذة فقط")}</div>;
            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center"><h2 className="text-2xl font-black text-slate-800">{cleanText("ادارة الاقسام")}</h2><button onClick={()=>setShowC(true)} className="w-12 h-12 bg-slate-50 text-sky-500 rounded-2xl flex items-center justify-center border border-slate-100 shadow-sm"><i className="fas fa-plus"></i></button></div>
                    <div className="flex gap-4 overflow-x-auto no-scrollbar pb-2">
                        {cls.map(c => (
                            <button key={c.id} onClick={()=>setSel(c)} className={`min-w-[160px] p-6 rounded-[35px] border text-right transition-all ${sel?.id === c.id ? 'bg-sky-500 border-sky-400 text-white shadow-md scale-105' : 'bg-slate-50 text-slate-400 border-slate-100'}`}>
                                <p className="font-black text-sm">{cleanText(c.name)}</p><p className="text-[10px] opacity-50 font-bold uppercase">Chat {c.chatCode}</p>
                            </button>
                        ))}
                    </div>
                    {sel && (
                        <div className="bg-white p-6 overflow-x-auto rounded-[35px] border border-slate-100 shadow-sm">
                            <div className="flex justify-between items-center mb-6"><h3 className="font-black text-sky-600 text-sm uppercase tracking-widest">{cleanText("طلاب")} {cleanText(sel.name)}</h3><button onClick={()=>setShowS(true)} className="bg-sky-50 text-sky-600 px-4 py-2 rounded-xl text-[10px] font-black border border-sky-100">اضافة طالب</button></div>
                            <table className="w-full text-[10px] text-center border-separate border-spacing-y-2">
                                <thead className="opacity-30 uppercase font-black"><tr><th className="p-2">الاسم</th><th className="p-2">مشاركة</th><th className="p-2">فرض1</th><th className="p-2">فرض2</th><th className="p-2">امتحان</th><th className="p-2">الكود</th></tr></thead>
                                <tbody>
                                    {stds.map(s => (
                                        <tr key={s.id} className="bg-slate-50">
                                            <td className="p-3 font-black rounded-r-2xl text-slate-700">{cleanText(s.fullName)}</td>
                                            <td className="p-3"><input type="number" className="w-10 p-1 text-center" value={s.participation} onChange={e=>db.collection(`classes/${sel.id}/students`).doc(s.id).update({participation: Number(e.target.value)})} /></td>
                                            <td className="p-3"><input type="number" className="w-10 p-1 text-center" value={s.test1} onChange={e=>db.collection(`classes/${sel.id}/students`).doc(s.id).update({test1: Number(e.target.value)})} /></td>
                                            <td className="p-3"><input type="number" className="w-10 p-1 text-center" value={s.test2} onChange={e=>db.collection(`classes/${sel.id}/students`).doc(s.id).update({test2: Number(e.target.value)})} /></td>
                                            <td className="p-3"><input type="number" className="w-10 p-1 text-center" value={s.exam} onChange={e=>db.collection(`classes/${sel.id}/students`).doc(s.id).update({exam: Number(e.target.value)})} /></td>
                                            <td className="p-3 rounded-l-2xl"><span className="code-text text-[8px]">{s.secretCode}</span></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                            <button onClick={gen} className="w-full mt-6 bg-amber-500 text-white py-5 rounded-[30px] font-black text-xs shadow-md active:scale-95 transition-all">توليد اكواد التلاميذ</button>
                        </div>
                    )}
                    {showC && <div className="fixed inset-0 bg-black/50 z-[200] flex items-center justify-center p-8 backdrop-blur-sm"><div className="bg-white w-full max-w-sm p-10 space-y-6 rounded-[40px] shadow-2xl"><h3 className="font-black text-2xl text-slate-800">{cleanText("قسم جديد")}</h3><input type="text" placeholder="اسم القسم" className="w-full p-5" value={cn} onChange={e=>setCn(e.target.value)} /><button onClick={addC} className="w-full py-5 bg-sky-500 text-white rounded-2xl font-black shadow-lg">تاكيد</button><button onClick={()=>setShowC(false)} className="w-full py-4 opacity-40 font-bold text-slate-500">الغاء</button></div></div>}
                    {showS && <div className="fixed inset-0 bg-black/50 z-[200] flex items-center justify-center p-8 backdrop-blur-sm"><div className="bg-white w-full max-w-sm p-10 space-y-6 rounded-[40px] shadow-2xl"><h3 className="font-black text-2xl text-slate-800">{cleanText("اضافة طالب")}</h3><input type="text" placeholder="الاسم الكامل" className="w-full p-5" value={sn} onChange={e=>setSn(e.target.value)} /><button onClick={addS} className="w-full py-5 bg-sky-500 text-white rounded-2xl font-black shadow-lg">اضافة</button><button onClick={()=>setShowS(false)} className="w-full py-4 opacity-40 font-bold text-slate-500">الغاء</button></div></div>}
                </div>
            );
        }

        function Info() {
            const [page, setPage] = useState('main');
            const team = ["عبد الحق", "ساجد حمزة", "احمد هاشم", "عبد الحميد", "حسام", "صهيب", "عبد الله", "سيف الدين", "اسلام", "عبد الجليل", "اسحاق", "حبيب", "ودود", "ياسر"];
            
            if (page === 'doc') return (
                <div className="bg-white min-h-full p-8 space-y-8 animate-in fade-in duration-500">
                    <button onClick={()=>setPage('main')} className="bg-slate-100 p-4 rounded-2xl text-slate-600 font-black"><i className="fas fa-arrow-right ml-2"></i> العودة</button>
                    <div className="text-center space-y-4">
                        <h2 className="text-4xl font-black text-sky-600">{cleanText("كتيب النظام الشامل")}</h2>
                        <p className="text-slate-400 font-bold">الاصدار الرسمي 1.0</p>
                    </div>
                    
                    <div className="doc-card">
                        <h3 className="text-xl font-black text-sky-600 mb-4"><i className="fas fa-code ml-2"></i> قصة الصنع والادوات</h3>
                        <p className="text-slate-600 leading-relaxed font-medium">تم تطوير هذا النظام التعليمي المتقدم باستخدام اقوى الادوات البرمجية العالمية حيث استخدمت بيئة <b>Android Studio</b> لبناء الهيكل و <b>VS Code</b> لكتابة الشيفرات البرمجية المعقدة مع الاعتماد على تقنيات <b>React</b> و <b>Firebase</b> لضمان السرعة والاداء العالي</p>
                    </div>

                    <div className="doc-card">
                        <h3 className="text-xl font-black text-red-600 mb-4"><i className="fas fa-shield-halved ml-2"></i> الحماية والحقوق القانونية</h3>
                        <p className="text-slate-600 leading-relaxed font-medium">هذا التطبيق محمي بموجب قوانين الملكية الفكرية الدولية يمنع منعا باتا سرقة التصميم او الشيفرة البرمجية او محاولة اختراق النظام او عمل هندسة عكسية <b>Reverse Engineering</b> للوصول الى قواعد البيانات اي محاولة تخريب ستعرض صاحبها للمساءلة القانونية المباشرة</p>
                    </div>

                    <div className="doc-card">
                        <h3 className="text-xl font-black text-sky-600 mb-4"><i className="fas fa-users ml-2"></i> المساهمون</h3>
                        <div className="grid grid-cols-2 gap-4 text-center font-black text-slate-700">
                            {team.map((n, i) => <div key={i} className="bg-white p-3 rounded-xl border border-slate-100 shadow-sm">{cleanText(n)}</div>)}
                        </div>
                    </div>

                    <div className="doc-card">
                        <h3 className="text-xl font-black text-green-600 mb-4"><i className="fas fa-check-circle ml-2"></i> السلامة والاعتماد</h3>
                        <p className="text-slate-600 leading-relaxed font-medium">النظام معتمد تربويا لادارة الاقسام بفعالية تامة حيث يضمن سلامة بيانات الطلاب وخصوصية المراسلات تم فحص النظام وتجربته لضمان بيئة تعليمية امنة وخالية من الثغرات</p>
                    </div>
                </div>
            );

            return (
                <div className="bg-white p-12 text-center space-y-8 rounded-[40px] border border-slate-100 shadow-sm">
                    <div className="w-24 h-24 bg-sky-500 rounded-[35px] flex items-center justify-center mx-auto text-4xl text-white shadow-lg"><i className="fas fa-shield-halved"></i></div>
                    <h2 className="text-4xl font-black tracking-tighter text-slate-800">{cleanText("ELITE CLAS")}</h2>
                    <div className="text-right space-y-4 font-bold">
                        <div className="p-6 bg-slate-50 rounded-3xl flex justify-between items-center border border-slate-100"><span>{cleanText(" المطور الرسمي")}</span><span className="text-sky-600">{cleanText("بن شعبان اسامة")}</span></div>
                        <div className="p-6 bg-slate-50 rounded-3xl flex justify-between items-center border border-slate-100"><span>{cleanText("باشراف الاستاذ")}</span><span className="text-slate-700">{cleanText("الحاج علي هشام")}</span></div>
                        <button onClick={()=>setPage('doc')} className="w-full p-8 bg-sky-50 text-sky-600 rounded-[40px] border border-sky-100 font-black text-xl flex items-center justify-center gap-4 hover:bg-sky-100 transition-all">
                            <i className="fas fa-book-open"></i> {cleanText("دليل النظام والتوثيق")}
                        </button>
                    </div>
                </div>
            );
        }

        function Sidebar({ onClose, onTab, onLogout }) {
            const items = [
                { id: 'home', label: 'الرئيسية', icon: 'fa-house' },
                { id: 'chat', label: 'غرفة الشات', icon: 'fa-comments' },
                { id: 'points', label: 'لوحة الشرف', icon: 'fa-star' },
                { id: 'exams', label: 'بنك النماذج', icon: 'fa-file-lines' },
                { id: 'ai', label: 'مساعد ذكي', icon: 'fa-robot' },
                { id: 'calc', label: 'حساب المعدل', icon: 'fa-calculator' },
                { id: 'classes', label: 'ادارة الاقسام', icon: 'fa-users-gear' },
                { id: 'info', label: 'عن النظام', icon: 'fa-circle-info' },
            ];
            return (
                <div className="fixed inset-0 z-[100]">
                    <div onClick={onClose} className="absolute inset-0 bg-black/20 backdrop-blur-sm" />
                    <aside className="absolute top-0 right-0 bottom-0 w-80 sidebar-bg p-10 shadow-2xl flex flex-col rounded-l-[50px]">
                        <div className="flex justify-between items-center mb-12"><h3 className="font-black text-2xl text-white">{cleanText("القائمة")}</h3><button onClick={onClose} className="text-white/50"><i className="fas fa-times text-2xl"></i></button></div>
                        <div className="flex-1 space-y-2 overflow-y-auto no-scrollbar">
                            {items.map(i => (
                                <button key={i.id} onClick={()=>onTab(i.id)} className="w-full flex items-center gap-5 p-5 rounded-3xl font-black text-white/70 hover:text-white hover:bg-white/10 transition-all">
                                    <i className={`fas ${i.icon} w-6 text-xl`}></i><span>{cleanText(i.label)}</span>
                                </button>
                            ))}
                        </div>
                        <button onClick={onLogout} className="w-full flex items-center gap-5 p-6 rounded-3xl font-black text-white mt-6 bg-red-500/20"><i className="fas fa-power-off w-6 text-xl"></i><span>{cleanText("خروج")}</span></button>
                    </aside>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
